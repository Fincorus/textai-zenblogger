services:
  textai-zenblogger:
    build: .
    container_name: textai-zenblogger
    env_file:
      - .env
    volumes:
      # RU: cookies можно монтировать как файл.
      # EN: mount cookies file from host.
      - ./cookies_dzen.json:/app/cookies_dzen.json:ro
      - ./artifacts:/app/artifacts
    ports:
      - "8080:8080"
    restart: unless-stopped

